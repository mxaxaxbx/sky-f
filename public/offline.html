<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="theme-color" content="#0b1220">
  <title>Sky - Offline</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e5eefb;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      max-width: 480px;
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: rgba(229, 238, 251, 0.82);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You are offline</h1>
    <p>Sky is installed, but this route needs a connection right now. Please reconnect and reload to continue.</p>
  </main>
</body>
</html>
